steps:
  # 1. Construir la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'europe-west1-docker.pkg.dev/cuviv-pocs/cuviv-agent1-srv/cuviv-agent1-api-img:latest',
        '.'
      ]

  # 2. Subir la imagen al repositorio Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'europe-west1-docker.pkg.dev/cuviv-pocs/cuviv-agent1-srv/cuviv-agent1-api-img:latest'
      ]

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'cuviv-agent1-api',
        '--image',
        'europe-west1-docker.pkg.dev/cuviv-pocs/cuviv-agent1-srv/cuviv-agent1-api-img:latest',
        '--region',
        'europe-west1',
        '--project',
        'cuviv-pocs',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'europe-west1-docker.pkg.dev/cuviv-pocs/cuviv-agent1-srv/cuviv-agent1-api-img:latest'

options:
  logging: CLOUD_LOGGING_ONLY